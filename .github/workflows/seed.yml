name: Daily HTTP Call

on:
  schedule:
    - cron: '0 12 * * *'   # Daily at 12:00 UTC
    - cron: '0 12 * * 0'   # Weekly on Sunday at 12:00 UTC
    - cron: '0 12 * * 1'   # Weekly on Monday at 12:00 UTC
  workflow_dispatch: # manual trigger setup
    inputs:
      run:
        description: 'Which job to run'
        required: true
        default: daily
        type: choice
        options:
          - daily
          - weekly
          - clear

jobs:
  daily-call:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 12 * * *') ||
      (github.event_name == 'workflow_dispatch' && (inputs.run == 'daily'))
    runs-on: ubuntu-latest

    steps:
      - name: Daily seed call
        run: |
          curl -X POST ${{ secrets.URL }}/api/seed?frequency=daily \
            -H "Content-Type: application/json" \
            -H "x-seed-secret: ${{ secrets.SEED_SECRET }}"
  
  weekly-call:
    if: | 
      (github.event_name == 'schedule' && github.event.schedule == '0 12 * * 0') || 
      (github.event_name == 'workflow_dispatch' && (inputs.run == 'weekly'))
    runs-on: ubuntu-latest

    steps:
      - name: Weekly Seed call
        run: |
          curl -X POST ${{ secrets.URL }}/api/seed?frequency=weekly \
            -H "Content-Type: application/json" \
            -H "x-seed-secret: ${{ secrets.SEED_SECRET }}"
  
  clear-call:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 12 * * 1') ||
      (github.event_name == 'workflow_dispatch' && (inputs.run == 'clear'))
    runs-on: ubuntu-latest

    steps:
      - name: Weekly Clear call
        run: |
          curl -X POST ${{ secrets.URL }}/api/clear \
            -H "Content-Type: application/json" \
            -H "x-seed-secret: ${{ secrets.SEED_SECRET }}"